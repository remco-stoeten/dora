version: "3.8"

services:
  mariadb:
    image: mariadb:11.4
    container_name: dora-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_ROOT_HOST: "%"
      MARIADB_DATABASE: dora
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  cockroach:
    image: cockroachdb/cockroach:v25.1.1
    container_name: dora-cockroach
    restart: unless-stopped
    command:
      - start-single-node
      - --insecure
      - --listen-addr=0.0.0.0:26257
      - --http-addr=0.0.0.0:8080
      - --advertise-addr=cockroach:26257
      - --store=/cockroach-data
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data:/cockroach-data
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=127.0.0.1:26257 -e 'SELECT 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mariadb-data:
  cockroach-data:
