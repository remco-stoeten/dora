services:
  postgres:
    image: postgres:17
    container_name: dora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: rootpass
      POSTGRES_DB: dora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dora"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql:
    image: mysql:8.4
    container_name: dora-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: dora
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  mariadb:
    image: mariadb:11.4
    container_name: dora-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_ROOT_HOST: "%"
      MARIADB_DATABASE: dora
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  cockroach:
    image: cockroachdb/cockroach:v25.1.1
    container_name: dora-cockroach
    restart: unless-stopped
    command:
      - start-single-node
      - --insecure
      # CockroachDB v24+ rejects an explicit 0.0.0.0 host; ":port" binds all interfaces.
      - --listen-addr=:26257
      - --http-addr=:8080
      - --advertise-addr=cockroach:26257
      - --store=/cockroach-data
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data:/cockroach-data
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=127.0.0.1:26257 -e 'SELECT 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    container_name: dora-libsql
    restart: unless-stopped
    environment:
      # Local sqld in primary mode; no auth token required for local dev.
      SQLD_NODE: primary
    ports:
      - "8081:8080"
    volumes:
      - libsql-data:/var/lib/sqld
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
  mysql-data:
  mariadb-data:
  cockroach-data:
  libsql-data:
